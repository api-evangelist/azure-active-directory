          description: A collection of app role assignment objects.
          content:
            application/json:
              schema:
                type: object
                properties:
                  '@odata.context':
                    type: string
                  value:
                    type: array
                    items:
                      $ref: '#/components/schemas/AppRoleAssignment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - oauth2:
            - Application.Read.All
            - Directory.Read.All
      externalDocs:
        url: https://learn.microsoft.com/en-us/graph/api/serviceprincipal-list-approleassignments?view=graph-rest-1.0
components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: >-
        Microsoft identity platform OAuth 2.0 authorization. Supports
        authorization code flow, client credentials flow, and on-behalf-of
        flow. All API calls require a valid access token obtained from
        the Microsoft identity platform.
      flows:
        authorizationCode:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/v2.0/authorize
          tokenUrl: https://login.microsoftonline.com/common/oauth2/v2.0/token
          scopes:
            User.Read: Sign in and read user profile
            User.Read.All: Read all users' full profiles
            User.ReadWrite.All: Read and write all users' full profiles
            Group.Read.All: Read all groups
            Group.ReadWrite.All: Read and write all groups
            GroupMember.Read.All: Read group memberships
            GroupMember.ReadWrite.All: Read and write group memberships
            Application.Read.All: Read all applications
            Application.ReadWrite.All: Read and write all applications
            Directory.Read.All: Read directory data
            Directory.ReadWrite.All: Read and write directory data
        clientCredentials:
          tokenUrl: https://login.microsoftonline.com/{tenant}/oauth2/v2.0/token
          scopes:
            https://graph.microsoft.com/.default: Default scope for client credentials
  parameters:
    userId:
      name: user-id
      in: path
      required: true
      description: >-
        The unique identifier of the user (object ID) or the user principal
        name (UPN), such as user@contoso.com.
      schema:
        type: string
    groupId:
      name: group-id
      in: path
      required: true
      description: The unique identifier (object ID) of the group.
      schema:
        type: string
        format: uuid
    applicationId:
      name: application-id
      in: path
      required: true
      description: The unique identifier (object ID) of the application.
      schema:
        type: string
        format: uuid
    servicePrincipalId:
      name: servicePrincipal-id
      in: path
      required: true
      description: The unique identifier (object ID) of the service principal.
      schema:
        type: string
        format: uuid
    top:
      name: $top
      in: query
      description: >-
        Sets the page size of results. Maximum value depends on the API;
        defaults to 100 for most identity resources.
      schema:
        type: integer
        minimum: 1
        maximum: 999
    skip:
      name: $skip
      in: query
      description: Skips the specified number of items in the result set.
      schema:
        type: integer
        minimum: 0
    search:
      name: $search
      in: query
      description: >-
        Search items by search phrases. Requires ConsistencyLevel header
        set to eventual. Supports searching displayName and description.
      schema:
        type: string
    filter:
      name: $filter
      in: query
      description: >-
        Filters results using OData filter expressions. Supports eq, ne,
        not, in, startsWith, endsWith, and lambda operators.
      schema:
        type: string
    count:
      name: $count
      in: query
      description: >-
        Includes a count of the total number of items in a collection
        alongside the page of data values. Requires ConsistencyLevel header.
      schema:
        type: boolean
    orderby:
      name: $orderby
      in: query
      description: >-
        Specifies the order of items returned. Use asc for ascending or
        desc for descending. Example: displayName asc.
      schema:
        type: string
    select:
      name: $select
      in: query
      description: >-
        Selects specific properties to return. Comma-separated list of
        property names. Example: id,displayName,mail.
      schema:
        type: string
    expand:
      name: $expand
      in: query
      description: >-
        Expands related entities inline. For example, expand members
        of a group or manager of a user.
      schema:
        type: string
    consistencyLevel:
      name: ConsistencyLevel
      in: header
      description: >-
        Indicates the requested consistency level. Required for advanced
        queries using $search, $filter with certain functions, or $count.
        Set to eventual.
      schema:
        type: string
        enum:
          - eventual
  schemas:
    DirectoryObject:
      type: object
      description: >-
        Represents an Azure Active Directory directory object. This is the
        base type for most directory resources.
      properties:
        '@odata.type':
          type: string
          description: The OData type of the directory object.
        id:
          type: string
          format: uuid
          description: >-
            The unique identifier for the object. Globally unique across
            all directory objects.
          readOnly: true
        deletedDateTime:
          type: string
          format: date-time
          description: Date and time when this object was deleted.
          readOnly: true
    User:
      type: object
      description: >-
        Represents an Azure AD user account. Inherits from directoryObject.
        Contains identity, profile, organizational, and authentication
        properties.
      allOf:
        - $ref: '#/components/schemas/DirectoryObject'
      properties:
        accountEnabled:
          type: boolean
          description: >-
            True if the account is enabled; otherwise, false.
        assignedLicenses:
          type: array
          items:
            $ref: '#/components/schemas/AssignedLicense'
          description: The licenses that are assigned to the user.
          readOnly: true
        assignedPlans:
          type: array
          items:
            $ref: '#/components/schemas/AssignedPlan'
          description: The plans that are assigned to the user.
          readOnly: true
        businessPhones:
          type: array
          items:
            type: string
          description: The telephone numbers for the user.
        city:
          type:
            - string
            - 'null'
          description: The city where the user is located.
        companyName:
          type:
            - string
            - 'null'
          description: The company name associated with the user.
        country:
          type:
            - string
            - 'null'
          description: The country or region where the user is located.
        createdDateTime:
          type: string
          format: date-time
          description: The date and time the user was created.
          readOnly: true
        department:
          type:
            - string
            - 'null'
          description: The department in which the user works.
        displayName:
          type: string
          description: >-
            The name displayed in the address book for the user. Required
            on creation.
        employeeId:
          type:
            - string
            - 'null'
          description: >-
            The employee identifier assigned to the user by the organization.
        employeeType:
          type:
            - string
            - 'null'
          description: >-
            Captures the enterprise worker type. For example, Employee,
            Contractor, Consultant, or Vendor.
        givenName:
          type:
            - string
            - 'null'
          description: The given name (first name) of the user.
        jobTitle:
          type:
            - string
            - 'null'
          description: The user's job title.
        mail:
          type:
            - string
            - 'null'
          format: email
          description: The SMTP address for the user.
        mailNickname:
          type: string
          description: >-
            The mail alias for the user. Required on creation.
        mobilePhone:
          type:
            - string
            - 'null'
          description: The primary cellular telephone number for the user.
        officeLocation:
          type:
            - string
            - 'null'
          description: The office location in the user's place of business.
        onPremisesDistinguishedName:
          type:
            - string
            - 'null'
          description: The on-premises Active Directory distinguished name.
          readOnly: true
        onPremisesDomainName:
          type:
            - string
            - 'null'
          description: The on-premises domain name.
          readOnly: true
        onPremisesImmutableId:
          type:
            - string
            - 'null'
          description: >-
            Used to associate an on-premises Active Directory user account
            to the Azure AD user object.
        onPremisesLastSyncDateTime:
          type:
            - string
            - 'null'
          format: date-time
          description: >-
            The last time at which the object was synced with the
            on-premises directory.
          readOnly: true
        onPremisesSyncEnabled:
          type:
            - boolean
            - 'null'
          description: >-
            True if this user object is currently being synced from an
            on-premises Active Directory.
          readOnly: true
        otherMails:
          type: array
          items:
            type: string
            format: email
          description: Additional email addresses for the user.
        passwordPolicies:
          type:
            - string
            - 'null'
          description: >-
            Specifies password policies for the user. One of
            DisableStrongPassword and DisablePasswordExpiration, or both.
        postalCode:
          type:
            - string
            - 'null'
          description: The postal code for the user's postal address.
        preferredLanguage:
          type:
            - string
            - 'null'
          description: >-
            The preferred language for the user in ISO 639-1 code format.
            Example: en-US.
        proxyAddresses:
          type: array
          items:
            type: string
          description: >-
            The proxy addresses for the user. Example:
            SMTP:user@contoso.com, smtp:alias@contoso.com.
          readOnly: true
        signInSessionsValidFromDateTime:
          type: string
          format: date-time
          description: >-
            Any refresh tokens or session tokens issued before this time
            are invalid.
          readOnly: true
        state:
          type:
            - string
            - 'null'
          description: The state or province in the user's address.
        streetAddress:
          type:
            - string
            - 'null'
          description: The street address of the user's place of business.
        surname:
          type:
            - string
            - 'null'
          description: The user's surname (family name or last name).
        usageLocation:
          type:
            - string
            - 'null'
          description: >-
            A two-letter country code (ISO 3166). Required for users who
            will be assigned licenses.
        userPrincipalName:
          type: string
          description: >-
            The user principal name (UPN) of the user. Required on
            creation. Format: alias@domain.
        userType:
          type:
            - string
            - 'null'
          description: >-
            A string value that classifies the user. Typically Member
            or Guest.
          enum:
            - Member
            - Guest
    UserCreate:
      type: object
      description: Properties required when creating a new user.
      required:
        - accountEnabled
        - displayName
        - mailNickname
        - userPrincipalName
        - passwordProfile
      properties:
        accountEnabled:
          type: boolean
          description: True if the account should be enabled.
        displayName:
          type: string
          description: The name to display in the address book.
        mailNickname:
          type: string
          description: The mail alias for the user.
        userPrincipalName:
          type: string
          description: The user principal name (user@contoso.com).
        passwordProfile:
          $ref: '#/components/schemas/PasswordProfile'
        givenName:
          type: string
        surname:
          type: string
        jobTitle:
          type: string
        department:
          type: string
        usageLocation:
          type: string
        city:
          type: string
        country:
          type: string
        mobilePhone:
          type: string
        businessPhones:
          type: array
          items:
            type: string
    UserUpdate:
      type: object
      description: Properties that can be updated on an existing user.
      properties:
        accountEnabled:
          type: boolean
        displayName:
          type: string
        givenName:
          type: string
        surname:
          type: string
        jobTitle:
          type: string
        department:
          type: string
        mail:
          type: string
        mobilePhone:
          type: string
        businessPhones:
          type: array
          items:
            type: string
        city:
          type: string
        state:
          type: string
        country:
          type: string
        postalCode:
          type: string
        streetAddress:
          type: string
        officeLocation:
          type: string
        usageLocation:
          type: string
        passwordProfile:
          $ref: '#/components/schemas/PasswordProfile'
        preferredLanguage:
          type: string
        employeeId:
          type: string
        employeeType:
          type: string
        companyName:
          type: string
    PasswordProfile:
      type: object
      description: Contains the password profile associated with a user.
      required:
        - password
      properties:
        forceChangePasswordNextSignIn:
          type: boolean
          description: >-
            True if the user must change their password on the next sign-in.
          default: false
        forceChangePasswordNextSignInWithMfa:
          type: boolean
          description: >-
            If true, the user must perform multi-factor authentication
            before being forced to change their password.
          default: false
        password:
          type: string
          format: password
          description: >-
            The password for the user. Must satisfy the tenant's password
            complexity requirements. Setting a strong password is
            recommended.
    AssignedLicense:
      type: object
      description: Represents a license assigned to a user.
      properties:
        disabledPlans:
          type: array
          items:
            type: string
            format: uuid
          description: A collection of the unique identifiers for plans that have been disabled.
        skuId:
          type: string
          format: uuid
          description: The unique identifier for the SKU.
    AssignedPlan:
      type: object
      description: Represents a plan assigned to a user.
      properties:
        assignedDateTime:
          type: string
          format: date-time
        capabilityStatus:
          type: string
          enum:
            - Enabled
            - Warning
            - Suspended
            - Deleted
            - LockedOut
        service:
          type: string
        servicePlanId:
          type: string
          format: uuid
    Group:
      type: object
      description: >-
        Represents an Azure AD group. Groups are collections of principals
        with shared access to resources. Microsoft Graph supports several
        types of groups: Microsoft 365 groups, security groups, and
        mail-enabled security groups.
      allOf:
        - $ref: '#/components/schemas/DirectoryObject'
      properties:
        classification:
          type:
            - string
            - 'null'
          description: Classification for the group (e.g., low, medium, high business impact).
        createdDateTime:
          type: string
          format: date-time
          description: Timestamp of when the group was created.
          readOnly: true
        description:
          type:
            - string
            - 'null'
          description: An optional description for the group.
        displayName:
          type: string
          description: The display name for the group. Required on creation.
        expirationDateTime:
          type:
            - string
            - 'null'
          format: date-time
          description: Timestamp of when the group is set to expire.
        groupTypes:
          type: array
          items:
            type: string
          description: >-
            Specifies the group type. Include Unified for Microsoft 365
            groups. Include DynamicMembership for dynamic groups.
        isAssignableToRole:
          type:
            - boolean
            - 'null'
          description: >-
            Indicates whether this group can be assigned to an Azure AD
            role. Can only be set at creation time.
        mail:
          type:
            - string
            - 'null'
          format: email
          description: The SMTP address for the group.
          readOnly: true
        mailEnabled:
          type: boolean
          description: >-
            Specifies whether the group is mail-enabled. Required on
            creation.
        mailNickname:
          type: string
          description: >-
            The mail alias for the group, unique for Microsoft 365 groups.
            Required on creation.
        membershipRule:
          type:
            - string
            - 'null'
          description: >-
            The rule that determines members for a dynamic group.
        membershipRuleProcessingState:
          type:
            - string
            - 'null'
          description: >-
            Indicates whether the dynamic membership processing is on
            or paused. On or Paused.
        onPremisesDomainName:
          type:
            - string
            - 'null'
          readOnly: true
        onPremisesLastSyncDateTime:
          type:
            - string
            - 'null'
          format: date-time
          readOnly: true
        onPremisesSyncEnabled:
          type:
            - boolean
            - 'null'
          readOnly: true
        preferredLanguage:
          type:
            - string
            - 'null'
          description: >-
            The preferred language for a Microsoft 365 group in ISO 639-1
            format.
        proxyAddresses:
          type: array
          items:
            type: string
          readOnly: true
        renewedDateTime:
          type: string
          format: date-time
          description: Timestamp of when the group was last renewed.
          readOnly: true
        securityEnabled:
          type: boolean
          description: >-
            Specifies whether the group is a security group. Required on
            creation.
        securityIdentifier:
          type:
            - string
            - 'null'
          description: Security identifier (SID) of the group.
          readOnly: true
        visibility:
          type:
            - string
            - 'null'
          description: >-
            Specifies the group join policy and group content visibility.
            Public, Private, or HiddenMembership.
          enum:
            - Public
            - Private
            - HiddenMembership
    GroupCreate:
      type: object
      description: Properties required when creating a new group.
      required:
        - displayName
        - mailEnabled
        - mailNickname
        - securityEnabled
      properties:
        displayName:
          type: string
          description: The display name for the group.
        description:
          type: string
        groupTypes:
          type: array
          items:
            type: string
          description: >-
            Set to ["Unified"] for Microsoft 365 groups. Omit for security
            groups.
        mailEnabled:
          type: boolean
        mailNickname:
          type: string
        securityEnabled:
          type: boolean
        visibility:
          type: string
          enum:
            - Public
            - Private
            - HiddenMembership
        isAssignableToRole:
          type: boolean
        'members@odata.bind':
          type: array
          items:
            type: string
            format: uri
          description: >-
            List of directory object URLs to add as members. Example:
            https://graph.microsoft.com/v1.0/directoryObjects/{id}
        'owners@odata.bind':
          type: array
          items:
            type: string
            format: uri
          description: List of directory object URLs to set as owners.
    GroupUpdate:
      type: object
      description: Properties that can be updated on an existing group.
      properties:
        displayName:
          type: string
        description:
          type: string
        mailNickname:
          type: string
        visibility:
          type: string
          enum:
            - Public
            - Private
            - HiddenMembership
        membershipRule:
          type: string
        membershipRuleProcessingState:
          type: string
          enum:
            - 'On'
            - Paused
        preferredLanguage:
          type: string
        classification:
          type: string
    Application:
      type: object
      description: >-
        Represents an application registration in Azure AD. An application
        object is the global definition of an application, specifying how
        tokens are issued, the resources the application needs to access,
        and the actions it can perform.
      allOf:
        - $ref: '#/components/schemas/DirectoryObject'
      properties:
        appId:
          type: string
          format: uuid
          description: >-
            The unique identifier assigned by Azure AD when the app is
            registered. Also known as the client ID.
          readOnly: true
        displayName:
          type: string
          description: The display name for the application.
        description:
          type:
            - string
            - 'null'
          description: A free text field to describe the application.
        createdDateTime:
          type: string
          format: date-time
          description: The date and time the application was registered.
          readOnly: true
        identifierUris:
          type: array
          items:
            type: string
            format: uri
          description: >-
            URIs that identify the application within its Azure AD tenant.
            Also known as App ID URIs.
        keyCredentials:
          type: array
          items:
            $ref: '#/components/schemas/KeyCredential'
          description: The collection of key credentials (certificates) associated with the application.
        passwordCredentials:
          type: array
          items:
            $ref: '#/components/schemas/PasswordCredential'
          description: The collection of password credentials (client secrets) associated with the application.
        api:
          $ref: '#/components/schemas/ApiApplication'
        appRoles:
          type: array
          items:
            $ref: '#/components/schemas/AppRole'
          description: >-
            The collection of roles defined for the application.
        requiredResourceAccess:
          type: array
          items:
            $ref: '#/components/schemas/RequiredResourceAccess'
          description: >-
            Specifies the resources that the application needs access to.
        signInAudience:
          type: string
          description: >-
            Specifies the Microsoft accounts supported for the current
            application.
          enum:
            - AzureADMyOrg
            - AzureADMultipleOrgs
            - AzureADandPersonalMicrosoftAccount
            - PersonalMicrosoftAccount
        spa:
          $ref: '#/components/schemas/SpaApplication'
        web:
          $ref: '#/components/schemas/WebApplication'
        publicClient:
          $ref: '#/components/schemas/PublicClientApplication'
        tags:
          type: array
          items:
            type: string
          description: Custom strings that can be used to categorize the application.
        publisherDomain:
          type: string
          description: The verified publisher domain for the application.
          readOnly: true
    ApplicationCreate:
      type: object
      description: Properties required when creating a new application registration.
      required:
        - displayName
      properties:
        displayName:
          type: string
          description: The display name for the application.
        description:
          type: string
        signInAudience:
          type: string
          enum:
            - AzureADMyOrg
            - AzureADMultipleOrgs
            - AzureADandPersonalMicrosoftAccount
            - PersonalMicrosoftAccount
        identifierUris:
          type: array
          items:
            type: string
        web:
          $ref: '#/components/schemas/WebApplication'
        spa:
          $ref: '#/components/schemas/SpaApplication'
        publicClient:
          $ref: '#/components/schemas/PublicClientApplication'
        api:
          $ref: '#/components/schemas/ApiApplication'
        appRoles:
          type: array
          items:
            $ref: '#/components/schemas/AppRole'
        requiredResourceAccess:
          type: array
          items:
            $ref: '#/components/schemas/RequiredResourceAccess'
        tags:
          type: array
          items:
            type: string
    ApplicationUpdate:
      type: object
      description: Properties that can be updated on an existing application.
      properties:
        displayName:
          type: string
        description:
          type: string
        signInAudience:
          type: string
        identifierUris:
          type: array
          items:
            type: string
        web:
          $ref: '#/components/schemas/WebApplication'
        spa:
          $ref: '#/components/schemas/SpaApplication'
        publicClient:
          $ref: '#/components/schemas/PublicClientApplication'
        api:
          $ref: '#/components/schemas/ApiApplication'
        appRoles:
          type: array
          items:
            $ref: '#/components/schemas/AppRole'
        requiredResourceAccess:
          type: array
          items:
            $ref: '#/components/schemas/RequiredResourceAccess'
        tags:
          type: array
          items:
            type: string
    WebApplication:
      type: object
      description: Configuration for a web application.
      properties:
        homePageUrl:
          type:
            - string
            - 'null'
          format: uri
          description: Home page or landing page of the application.
        logoutUrl:
          type:
            - string
            - 'null'
          format: uri
          description: URL used by the authorization service to sign out a user.
        redirectUris:
          type: array
          items:
            type: string
            format: uri
          description: >-
            URIs to which Azure AD will redirect after authentication.
        implicitGrantSettings:
          type: object
          properties:
            enableAccessTokenIssuance:
              type: boolean
              description: Specifies whether web application can request an access token using OAuth 2.0 implicit flow.
            enableIdTokenIssuance:
              type: boolean
              description: Specifies whether web application can request an ID token using OAuth 2.0 implicit flow.
    SpaApplication:
      type: object
      description: Configuration for a single-page application.
      properties:
        redirectUris:
          type: array
          items:
            type: string
            format: uri
          description: >-
            Redirect URIs for the single-page application using
            authorization code flow with PKCE.
    PublicClientApplication:
      type: object
      description: Configuration for a public client (mobile/desktop) application.
      properties:
        redirectUris:
          type: array
          items:
            type: string
            format: uri
          description: Redirect URIs for the public client application.
    ApiApplication:
      type: object
      description: Configuration for an application that exposes a web API.
      properties:
        acceptMappedClaims:
          type:
            - boolean
            - 'null'
          description: >-
            If true, allows an application to use claims mapping without
            specifying a custom signing key.
        knownClientApplications:
          type: array
          items:
            type: string
            format: uuid
          description: >-
            Used for bundling consent. Lists client app IDs that are
            considered known clients of this API.
        oauth2PermissionScopes:
          type: array
          items:
            $ref: '#/components/schemas/PermissionScope'
          description: >-
            The definition of the delegated permissions exposed by the
            web API.
        preAuthorizedApplications:
          type: array
          items:
            type: object
            properties:
              appId:
                type: string
                format: uuid
              delegatedPermissionIds:
                type: array
                items:
                  type: string
                  format: uuid
          description: >-
            Lists applications that are pre-authorized with specified
            delegated permissions.
        requestedAccessTokenVersion:
          type:
            - integer
            - 'null'
          description: >-
            The access token version expected by this resource. Possible
            values are 1 or 2.
          enum:
            - 1
            - 2
    PermissionScope:
      type: object
      description: Represents a delegated permission (OAuth2 scope).
      properties:
        adminConsentDescription:
          type: string
        adminConsentDisplayName:
          type: string
        id:
          type: string
          format: uuid
        isEnabled:
          type: boolean
        type:
          type: string
          enum:
            - User
            - Admin
        userConsentDescription:
          type: string
        userConsentDisplayName:
          type: string
        value:
          type: string
          description: >-
            The value to include in the scp claim in access tokens.
    AppRole:
      type: object
      description: >-
        Represents an application role that can be assigned to users, groups,
        or service principals.
      properties:
        allowedMemberTypes:
          type: array
          items:
            type: string
            enum:
              - User
              - Application
          description: >-
            Specifies whether this app role can be assigned to users and
            groups or to applications.
        description:
          type: string
        displayName:
          type: string
        id:
          type: string
          format: uuid
        isEnabled:
          type: boolean
        value:
          type: string
          description: >-
            The value to include in the roles claim in access tokens.
    RequiredResourceAccess:
      type: object
      description: >-
        Specifies the set of OAuth 2.0 permission scopes and app roles
        that an application requires access to.
      properties:
        resourceAppId:
          type: string
          format: uuid
          description: >-
            The unique identifier for the resource that the application
            requires access to (e.g., Microsoft Graph).
        resourceAccess:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
                description: Identifier of the permission scope or app role.
              type:
                type: string
                enum:
                  - Scope
                  - Role
                description: Whether this is a delegated permission (Scope) or application permission (Role).
    KeyCredential:
      type: object
      description: Contains a key credential (certificate) associated with an application or service principal.
      properties:
        customKeyIdentifier:
          type:
            - string
            - 'null'
          description: Custom key identifier.
        displayName:
          type:
            - string
            - 'null'
        endDateTime:
          type: string
          format: date-time
          description: The date and time at which the credential expires.
        key:
          type:
            - string
            - 'null'
          format: byte
          description: The certificate raw data in byte array converted to Base64 string.
        keyId:
          type: string
          format: uuid
        startDateTime:
          type: string
          format: date-time
        type:
          type: string
          description: The type of key credential (e.g., AsymmetricX509Cert).
        usage:
          type: string
          description: >-
            Describes the purpose of the key. Valid values are Verify
            and Sign.
          enum:
            - Sign
            - Verify
    PasswordCredential:
      type: object
      description: Contains a password credential (client secret) associated with an application or service principal.
      properties:
        customKeyIdentifier:
          type:
            - string
            - 'null'
          format: byte
        displayName:
          type:
            - string
            - 'null'
        endDateTime:
          type: string
          format: date-time
          description: The date and time at which the password expires.
        hint:
          type:
            - string
            - 'null'
          description: Contains the first three characters of the password.
          readOnly: true
        keyId:
          type: string
          format: uuid
        secretText:
          type:
            - string
            - 'null'
          description: >-
            The client secret value. Only returned on creation; not
            retrievable afterward.
          readOnly: true
        startDateTime:
          type: string
          format: date-time
    ServicePrincipal:
      type: object
      description: >-
        Represents an instance of an application in a directory. A service
        principal is the local representation or application instance of a
        global application object in a single tenant. It defines what the
        app can do in the tenant, who can access it, and what resources the
        app can access.
      allOf:
        - $ref: '#/components/schemas/DirectoryObject'
      properties:
        accountEnabled:
          type: boolean
          description: True if the service principal account is enabled.
        appDescription:
          type:
            - string
            - 'null'
          description: Description copied from the associated application.
        appDisplayName:
          type:
            - string
            - 'null'
          description: The display name exposed by the associated application.
          readOnly: true
        appId:
          type: string
          format: uuid
          description: >-
            The unique identifier for the associated application (its
            appId property). Required on creation.
        appOwnerOrganizationId:
          type:
            - string
            - 'null'
          format: uuid
          description: >-
            Contains the tenant ID where the application is registered.
          readOnly: true
        appRoleAssignmentRequired:
          type: boolean
          description: >-
            Specifies whether users or other service principals need to
            be granted an app role assignment before accessing.
        appRoles:
          type: array
          items:
            $ref: '#/components/schemas/AppRole'
          description: Roles exposed by the associated application.
          readOnly: true
        displayName:
          type: string
          description: The display name for the service principal.
        homepage:
          type:
            - string
            - 'null'
          format: uri
          description: Home page or landing page of the application.
        keyCredentials:
          type: array
          items:
            $ref: '#/components/schemas/KeyCredential'
        loginUrl:
          type:
            - string
            - 'null'
          format: uri
          description: >-
            URL for the authentication provider to redirect users to for
            sign-in.
        logoutUrl:
          type:
            - string
            - 'null'
          format: uri
        notificationEmailAddresses:
          type: array
          items:
            type: string
            format: email
          description: >-
            Email addresses where Azure AD sends notifications when the
            active certificate is near expiration.
        oauth2PermissionScopes:
          type: array
          items:
            $ref: '#/components/schemas/PermissionScope'
          description: The delegated permissions exposed by the application.
          readOnly: true
        passwordCredentials:
          type: array
          items:
            $ref: '#/components/schemas/PasswordCredential'
        replyUrls:
          type: array
          items:
            type: string
            format: uri
          description: >-
            The URLs that user tokens are sent to for sign-in, or the
            redirect URIs for authorization code and access token
            responses.
        servicePrincipalNames:
          type: array
          items:
            type: string
          description: >-
            Contains the list of identifierUris and the appId from the
            associated application.
        servicePrincipalType:
          type: string
          description: >-
            Identifies whether the service principal represents an
            Application, ManagedIdentity, Legacy, or SocialIdp.
        signInAudience:
          type: string
          description: The audience that can sign in.
        tags:
          type: array
          items:
            type: string
          description: >-
            Custom strings used to categorize the service principal.
            The WindowsAzureActiveDirectoryIntegratedApp tag is used by
            the portal.
        tokenEncryptionKeyId:
          type:
            - string
            - 'null'
          format: uuid
    ServicePrincipalCreate:
      type: object
      description: Properties required when creating a new service principal.
      required:
        - appId
      properties:
        appId:
          type: string
          format: uuid
          description: The appId of the application to create a service principal for.
        displayName:
          type: string
        accountEnabled:
          type: boolean
        appRoleAssignmentRequired:
          type: boolean
        tags:
          type: array
          items:
            type: string
        notificationEmailAddresses:
          type: array
          items:
            type: string
    ServicePrincipalUpdate:
      type: object
      description: Properties that can be updated on an existing service principal.
      properties:
        accountEnabled:
          type: boolean
        appRoleAssignmentRequired:
          type: boolean
        displayName:
          type: string
        homepage:
          type: string
        loginUrl:
          type: string
        logoutUrl:
          type: string
        notificationEmailAddresses:
          type: array
          items:
            type: string
        replyUrls:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
    AppRoleAssignment:
      type: object
      description: >-
        Represents an app role assigned to a user, group, or service
        principal.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        appRoleId:
          type: string
          format: uuid
          description: >-
            The identifier of the app role. Set to the default app role
            ID of 00000000-0000-0000-0000-000000000000 if not specified.
        createdDateTime:
          type: string
          format: date-time
          readOnly: true
        principalDisplayName:
          type: string
          description: The display name of the principal (user, group, or service principal).
          readOnly: true
        principalId:
          type: string
          format: uuid
          description: The unique identifier of the principal being granted the role.
        principalType:
          type: string
          description: The type of the assigned principal (User, Group, or ServicePrincipal).
          readOnly: true
        resourceDisplayName:
          type: string
          description: The display name of the resource application.
          readOnly: true
        resourceId:
          type: string
          format: uuid
          description: The unique identifier of the resource service principal.
    ODataError:
      type: object
      description: OData error response from Microsoft Graph.
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Error code.
            message:
              type: string
              description: Error message.
            innerError:
              type: object
              properties:
                date:
                  type: string
                  format: date-time
                request-id:
                  type: string
                  format: uuid
                client-request-id:
                  type: string
                  format: uuid
  responses:
    BadRequest:
      description: Bad request. The request body or parameters are invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ODataError'
    Unauthorized:
      description: Unauthorized. Authentication is required or the provided token is invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ODataError'
    Forbidden:
      description: Forbidden. The caller does not have sufficient permissions.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ODataError'
    NotFound:
      description: Not found. The specified resource does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ODataError'
    Conflict:
      description: Conflict. The resource already exists or a concurrency conflict occurred.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ODataError'
    TooManyRequests:
      description: Too many requests. The client has been throttled.
      headers:
        Retry-After:
          description: Number of seconds to wait before retrying.
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ODataError'
    InternalServerError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ODataError'
