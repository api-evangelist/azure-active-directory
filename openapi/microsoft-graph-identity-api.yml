openapi: 3.1.0
info:
  title: Microsoft Graph Identity API
  description: >-
    The Microsoft Graph Identity API provides a unified programmability model
    for managing Azure Active Directory (Microsoft Entra ID) resources including
    users, groups, applications, and service principals. This specification
    covers the core identity and access management endpoints available through
    the Microsoft Graph v1.0 REST API.
  version: 1.0.0
  contact:
    name: Microsoft Graph Support
    url: https://developer.microsoft.com/en-us/graph
    email: graphdev@microsoft.com
  license:
    name: Microsoft API License
    url: https://learn.microsoft.com/en-us/legal/microsoft-apis/terms-of-use
  x-api-id: microsoft-graph-identity
  x-audience: external-public
servers:
  - url: https://graph.microsoft.com/v1.0
    description: Microsoft Graph v1.0 production endpoint
  - url: https://graph.microsoft.com/beta
    description: Microsoft Graph beta endpoint (preview features)
security:
  - oauth2:
      - User.Read
      - User.ReadWrite.All
      - Directory.Read.All
      - Directory.ReadWrite.All
tags:
  - name: Users
    description: >-
      Manage user accounts in Azure Active Directory. Users are the core
      identity objects representing people in an organization. Each user has
      a profile with attributes such as display name, email, job title, and
      authentication credentials.
    externalDocs:
      url: https://learn.microsoft.com/en-us/graph/api/resources/user?view=graph-rest-1.0
  - name: Groups
    description: >-
      Manage groups in Azure Active Directory. Groups can be security groups,
      Microsoft 365 groups, or mail-enabled security groups. They provide
      shared access to resources for a collection of users and other
      directory objects.
    externalDocs:
      url: https://learn.microsoft.com/en-us/graph/api/resources/group?view=graph-rest-1.0
  - name: Applications
    description: >-
      Manage application registrations in Azure Active Directory. An
      application object is the global representation of an application
      across all tenants, defining the app identity, access configuration,
      and capabilities.
    externalDocs:
      url: https://learn.microsoft.com/en-us/graph/api/resources/application?view=graph-rest-1.0
  - name: Service Principals
    description: >-
      Manage service principals in Azure Active Directory. A service principal
      is the local representation of an application in a specific tenant.
      It defines what the application can do in the tenant, who can access it,
      and what resources it can access.
    externalDocs:
      url: https://learn.microsoft.com/en-us/graph/api/resources/serviceprincipal?view=graph-rest-1.0
paths:
  /users:
    get:
      operationId: listUsers
      summary: List users
      description: >-
        Retrieve a list of user objects. By default, only a limited set of
        properties are returned. To return additional properties, use the
        $select OData query parameter. Returns up to 100 objects by default
        and up to 999 with $top.
      tags:
        - Users
      parameters:
        - $ref: '#/components/parameters/top'
        - $ref: '#/components/parameters/skip'
        - $ref: '#/components/parameters/search'
        - $ref: '#/components/parameters/filter'
        - $ref: '#/components/parameters/count'
        - $ref: '#/components/parameters/orderby'
        - $ref: '#/components/parameters/select'
        - $ref: '#/components/parameters/expand'
        - $ref: '#/components/parameters/consistencyLevel'
      responses:
        '200':
          description: A collection of user objects.
          content:
            application/json:
              schema:
                type: object
                properties:
                  '@odata.context':
                    type: string
                    description: OData context URL.
                  '@odata.nextLink':
                    type: string
                    format: uri
                    description: URL to retrieve the next page of results.
                  '@odata.count':
                    type: integer
                    description: Total count of matching resources.
                  value:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - oauth2:
            - User.Read.All
            - Directory.Read.All
      externalDocs:
        url: https://learn.microsoft.com/en-us/graph/api/user-list?view=graph-rest-1.0
    post:
      operationId: createUser
      summary: Create user
      description: >-
        Create a new user object. The request body must contain the required
        properties for the user including displayName, accountEnabled,
        mailNickname, passwordProfile, and userPrincipalName.
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: The created user object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      security:
        - oauth2:
            - User.ReadWrite.All
            - Directory.ReadWrite.All
      externalDocs:
        url: https://learn.microsoft.com/en-us/graph/api/user-post-users?view=graph-rest-1.0
  /users/{user-id}:
    get:
      operationId: getUser
      summary: Get user
      description: >-
        Retrieve the properties and relationships of a user object. Returns
        a default set of properties unless $select is used to specify
        additional properties.
      tags:
        - Users
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/select'
        - $ref: '#/components/parameters/expand'
      responses:
        '200':
          description: The requested user object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      security:
        - oauth2:
            - User.Read
            - User.Read.All
            - Directory.Read.All
      externalDocs:
        url: https://learn.microsoft.com/en-us/graph/api/user-get?view=graph-rest-1.0
    patch:
      operationId: updateUser
      summary: Update user
      description: >-
        Update the properties of a user object. Not all properties can be
        updated by member or guest users with their default permissions
        without administrator roles.
      tags:
        - Users
      parameters:
        - $ref: '#/components/parameters/userId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '204':
          description: User updated successfully. No content returned.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      security:
        - oauth2:
            - User.ReadWrite.All
            - Directory.ReadWrite.All
      externalDocs:
        url: https://learn.microsoft.com/en-us/graph/api/user-update?view=graph-rest-1.0
    delete:
      operationId: deleteUser
      summary: Delete user
      description: >-
        Delete a user object. When deleted, user resources are moved to a
        temporary container and can be restored within 30 days. After that
        time, they are permanently deleted.
      tags:
        - Users
      parameters:
        - $ref: '#/components/parameters/userId'
      responses:
        '204':
          description: User deleted successfully. No content returned.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      security:
        - oauth2:
            - User.ReadWrite.All
            - Directory.ReadWrite.All
      externalDocs:
        url: https://learn.microsoft.com/en-us/graph/api/user-delete?view=graph-rest-1.0
  /users/{user-id}/memberOf:
    get:
      operationId: listUserMemberOf
      summary: List user group memberships
      description: >-
        Get the groups, directory roles, and administrative units that the
        user is a direct member of.
      tags:
        - Users
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/top'
        - $ref: '#/components/parameters/filter'
        - $ref: '#/components/parameters/select'
        - $ref: '#/components/parameters/count'
        - $ref: '#/components/parameters/consistencyLevel'
      responses:
        '200':
          description: A collection of directory objects the user is a member of.
          content:
            application/json:
              schema:
                type: object
                properties:
                  '@odata.context':
                    type: string
                  value:
                    type: array
                    items:
                      $ref: '#/components/schemas/DirectoryObject'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - oauth2:
            - User.Read
            - Directory.Read.All
      externalDocs:
        url: https://learn.microsoft.com/en-us/graph/api/user-list-memberof?view=graph-rest-1.0
  /groups:
    get:
      operationId: listGroups
      summary: List groups
      description: >-
        List all the groups in an organization, including Microsoft 365
        groups, security groups, and mail-enabled security groups. Returns
        up to 100 objects by default.
      tags:
        - Groups
      parameters:
        - $ref: '#/components/parameters/top'
        - $ref: '#/components/parameters/skip'
        - $ref: '#/components/parameters/search'
        - $ref: '#/components/parameters/filter'
        - $ref: '#/components/parameters/count'
        - $ref: '#/components/parameters/orderby'
        - $ref: '#/components/parameters/select'
        - $ref: '#/components/parameters/expand'
        - $ref: '#/components/parameters/consistencyLevel'
      responses:
        '200':
          description: A collection of group objects.
          content:
            application/json:
              schema:
                type: object
                properties:
                  '@odata.context':
                    type: string
                  '@odata.nextLink':
                    type: string
                    format: uri
                  '@odata.count':
                    type: integer
                  value:
                    type: array
                    items:
                      $ref: '#/components/schemas/Group'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      security:
        - oauth2:
            - GroupMember.Read.All
            - Group.Read.All
            - Directory.Read.All
      externalDocs:
        url: https://learn.microsoft.com/en-us/graph/api/group-list?view=graph-rest-1.0
    post:
      operationId: createGroup
      summary: Create group
      description: >-
        Create a new group. You can create a Microsoft 365 group, a security
        group, or a mail-enabled security group. The request body must
        include displayName, mailEnabled, mailNickname, and
        securityEnabled.
      tags:
        - Groups
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupCreate'
      responses:
        '201':
          description: The created group object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      security:
        - oauth2:
            - Group.ReadWrite.All
            - Directory.ReadWrite.All
      externalDocs:
        url: https://learn.microsoft.com/en-us/graph/api/group-post-groups?view=graph-rest-1.0
  /groups/{group-id}:
    get:
      operationId: getGroup
      summary: Get group
      description: >-
        Get the properties and relationships of a group object. Returns a
        default set of properties unless $select is used.
      tags:
        - Groups
      parameters:
        - $ref: '#/components/parameters/groupId'
        - $ref: '#/components/parameters/select'
        - $ref: '#/components/parameters/expand'
      responses:
        '200':
          description: The requested group object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - oauth2:
            - GroupMember.Read.All
            - Group.Read.All
            - Directory.Read.All
      externalDocs:
        url: https://learn.microsoft.com/en-us/graph/api/group-get?view=graph-rest-1.0
    patch:
      operationId: updateGroup
      summary: Update group
      description: >-
        Update the properties of a group object. Not all properties can be
        updated at the same time.
      tags:
        - Groups
      parameters:
        - $ref: '#/components/parameters/groupId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupUpdate'
      responses:
        '204':
          description: Group updated successfully. No content returned.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - oauth2:
            - Group.ReadWrite.All
            - Directory.ReadWrite.All
      externalDocs:
        url: https://learn.microsoft.com/en-us/graph/api/group-update?view=graph-rest-1.0
    delete:
      operationId: deleteGroup
      summary: Delete group
      description: >-
        Delete a group. When a Microsoft 365 group is deleted, it is moved
        to a temporary container and can be restored within 30 days. Security
        groups are permanently deleted immediately.
      tags:
        - Groups
      parameters:
        - $ref: '#/components/parameters/groupId'
      responses:
        '204':
          description: Group deleted successfully. No content returned.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - oauth2:
            - Group.ReadWrite.All
            - Directory.ReadWrite.All
      externalDocs:
        url: https://learn.microsoft.com/en-us/graph/api/group-delete?view=graph-rest-1.0
  /groups/{group-id}/members:
    get:
      operationId: listGroupMembers
      summary: List group members
      description: >-
        Get a list of the group's direct members. A group can have users,
        organizational contacts, devices, service principals, and other
        groups as members.
      tags:
        - Groups
      parameters:
        - $ref: '#/components/parameters/groupId'
        - $ref: '#/components/parameters/top'
        - $ref: '#/components/parameters/filter'
        - $ref: '#/components/parameters/select'
        - $ref: '#/components/parameters/count'
        - $ref: '#/components/parameters/consistencyLevel'
      responses:
        '200':
          description: A collection of directory objects that are members of the group.
          content:
            application/json:
              schema:
                type: object
                properties:
                  '@odata.context':
                    type: string
                  value:
                    type: array
                    items:
                      $ref: '#/components/schemas/DirectoryObject'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - oauth2:
            - GroupMember.Read.All
            - Group.Read.All
            - Directory.Read.All
      externalDocs:
        url: https://learn.microsoft.com/en-us/graph/api/group-list-members?view=graph-rest-1.0
  /groups/{group-id}/members/$ref:
    post:
      operationId: addGroupMember
      summary: Add group member
      description: >-
        Add a member to a group by posting a reference to the directory
        object. Users, service principals, groups, and organizational
        contacts can be added as members.
      tags:
        - Groups
      parameters:
        - $ref: '#/components/parameters/groupId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - '@odata.id'
              properties:
                '@odata.id':
                  type: string
                  format: uri
                  description: >-
                    The full URL of the directory object to add. For example,
                    https://graph.microsoft.com/v1.0/directoryObjects/{id}.
                  examples:
                    - https://graph.microsoft.com/v1.0/directoryObjects/00000000-0000-0000-0000-000000000000
      responses:
        '204':
          description: Member added successfully. No content returned.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - oauth2:
            - GroupMember.ReadWrite.All
            - Group.ReadWrite.All
            - Directory.ReadWrite.All
      externalDocs:
        url: https://learn.microsoft.com/en-us/graph/api/group-post-members?view=graph-rest-1.0
  /applications:
    get:
      operationId: listApplications
      summary: List applications
      description: >-
        Get the list of application registrations in the organization. By
        default, returns a limited set of properties. Use $select to request
        additional properties.
      tags:
        - Applications
      parameters:
        - $ref: '#/components/parameters/top'
        - $ref: '#/components/parameters/skip'
        - $ref: '#/components/parameters/search'
        - $ref: '#/components/parameters/filter'
        - $ref: '#/components/parameters/count'
        - $ref: '#/components/parameters/orderby'
        - $ref: '#/components/parameters/select'
        - $ref: '#/components/parameters/consistencyLevel'
      responses:
        '200':
          description: A collection of application objects.
          content:
            application/json:
              schema:
                type: object
                properties:
                  '@odata.context':
                    type: string
                  '@odata.nextLink':
                    type: string
                    format: uri
                  '@odata.count':
                    type: integer
                  value:
                    type: array
                    items:
                      $ref: '#/components/schemas/Application'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      security:
        - oauth2:
            - Application.Read.All
            - Directory.Read.All
      externalDocs:
        url: https://learn.microsoft.com/en-us/graph/api/application-list?view=graph-rest-1.0
    post:
      operationId: createApplication
      summary: Create application
      description: >-
        Create a new application registration. The request body must contain
        the displayName property at minimum.
      tags:
        - Applications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationCreate'
      responses:
        '201':
          description: The created application object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      security:
        - oauth2:
            - Application.ReadWrite.All
            - Directory.ReadWrite.All
      externalDocs:
        url: https://learn.microsoft.com/en-us/graph/api/application-post-applications?view=graph-rest-1.0
  /applications/{application-id}:
    get:
      operationId: getApplication
      summary: Get application
      description: >-
        Get the properties and relationships of an application object.
      tags:
        - Applications
      parameters:
        - $ref: '#/components/parameters/applicationId'
        - $ref: '#/components/parameters/select'
        - $ref: '#/components/parameters/expand'
      responses:
        '200':
          description: The requested application object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - oauth2:
            - Application.Read.All
            - Directory.Read.All
      externalDocs:
        url: https://learn.microsoft.com/en-us/graph/api/application-get?view=graph-rest-1.0
    patch:
      operationId: updateApplication
      summary: Update application
      description: >-
        Update the properties of an application object.
      tags:
        - Applications
      parameters:
        - $ref: '#/components/parameters/applicationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationUpdate'
      responses:
        '204':
          description: Application updated successfully. No content returned.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - oauth2:
            - Application.ReadWrite.All
            - Directory.ReadWrite.All
      externalDocs:
        url: https://learn.microsoft.com/en-us/graph/api/application-update?view=graph-rest-1.0
    delete:
      operationId: deleteApplication
      summary: Delete application
      description: >-
        Delete an application object. Permanently deletes the application
        registration and its associated service principal.
      tags:
        - Applications
      parameters:
        - $ref: '#/components/parameters/applicationId'
      responses:
        '204':
          description: Application deleted successfully. No content returned.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - oauth2:
            - Application.ReadWrite.All
            - Directory.ReadWrite.All
      externalDocs:
        url: https://learn.microsoft.com/en-us/graph/api/application-delete?view=graph-rest-1.0
  /servicePrincipals:
    get:
      operationId: listServicePrincipals
      summary: List service principals
      description: >-
        Retrieve a list of service principal objects in the organization.
        Returns up to 100 objects by default.
      tags:
        - Service Principals
      parameters:
        - $ref: '#/components/parameters/top'
        - $ref: '#/components/parameters/skip'
        - $ref: '#/components/parameters/search'
        - $ref: '#/components/parameters/filter'
        - $ref: '#/components/parameters/count'
        - $ref: '#/components/parameters/orderby'
        - $ref: '#/components/parameters/select'
        - $ref: '#/components/parameters/expand'
        - $ref: '#/components/parameters/consistencyLevel'
      responses:
        '200':
          description: A collection of service principal objects.
          content:
            application/json:
              schema:
                type: object
                properties:
                  '@odata.context':
                    type: string
                  '@odata.nextLink':
                    type: string
                    format: uri
                  '@odata.count':
                    type: integer
                  value:
                    type: array
                    items:
                      $ref: '#/components/schemas/ServicePrincipal'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      security:
        - oauth2:
            - Application.Read.All
            - Directory.Read.All
      externalDocs:
        url: https://learn.microsoft.com/en-us/graph/api/serviceprincipal-list?view=graph-rest-1.0
    post:
      operationId: createServicePrincipal
      summary: Create service principal
      description: >-
        Create a new service principal object. The appId property in the
        request body is required and must reference an existing application
        registration.
      tags:
        - Service Principals
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServicePrincipalCreate'
      responses:
        '201':
          description: The created service principal object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServicePrincipal'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      security:
        - oauth2:
            - Application.ReadWrite.All
            - Directory.ReadWrite.All
      externalDocs:
        url: https://learn.microsoft.com/en-us/graph/api/serviceprincipal-post-serviceprincipals?view=graph-rest-1.0
  /servicePrincipals/{servicePrincipal-id}:
    get:
      operationId: getServicePrincipal
